<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SIMPLE &middot; Under Construction</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #06060f;
      font-family: 'Space Grotesk', sans-serif;
      color: #eef0f7;
    }

    .card {
      text-align: center;
      padding: 60px 48px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(12px);
      max-width: 520px;
      width: 90%;
    }

    .icon { font-size: 3.5rem; line-height: 1; margin-bottom: 24px; }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(100deg, #f34a7f, #9140f7, #11bcde, #fa873d);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 14px;
    }

    p {
      font-size: 1rem;
      color: #a6abc4;
      line-height: 1.65;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🚧</div>
    <h1>Under Construction</h1>
    <p>The SIMPLE project website is coming soon.<br>Check back later.</p>
  </div>
</body>
</html>
